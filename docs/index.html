<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SALAAM Audio</title>
    <style>
      :root {
        color: #1f1a17;
        background:
          radial-gradient(circle at top, rgba(201, 153, 92, 0.18), transparent 45%),
          linear-gradient(180deg, #f6efe4 0%, #efe5d6 100%);
        font-family: "Avenir Next", Avenir, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 40px;
        border: 1px solid rgba(101, 70, 44, 0.16);
        border-radius: 28px;
        background: rgba(255, 251, 245, 0.82);
        box-shadow: 0 24px 80px rgba(86, 57, 31, 0.1);
      }

      p {
        margin: 0 0 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.78rem;
        color: #8c5c33;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.5rem, 6vw, 4rem);
        line-height: 0.96;
      }

      audio {
        width: 100%;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>San Francisco Muslim Community Center</p>
      <h1>SALAAM Audio</h1>
      <audio controls preload="metadata">
        <source src="./SALAAM%20V1.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
      </audio>
    </main>
  </body>
</html>
